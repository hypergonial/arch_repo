name: Update PKGBUILD version and sha256
description: Updates pkgver, pkgrel, and sha256sums in PKGBUILD
inputs:
  version:
    description: "New pkgver (for example: 3.0.4)"
    required: true
  sha256:
    description: "New source archive sha256"
    required: true
  pkgrel:
    description: "pkgrel to set (default: 1)"
    required: false
    default: "1"
  file:
    description: "Path to PKGBUILD"
    required: false
    default: "PKGBUILD"

outputs:
  changed:
    description: Whether PKGBUILD was modified
    value: ${{ steps.update.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Update PKGBUILD
      shell: bash
      run: |
        set -euo pipefail

        file="${{ inputs.file }}"
        version="${{ inputs.version }}"
        pkgrel="${{ inputs.pkgrel }}"

        # Update pkgver
        sed -i "s/^pkgver=.*/pkgver=${version}/" "$file"

        # Update pkgrel
        sed -i "s/^pkgrel=.*/pkgrel=${pkgrel}/" "$file"
